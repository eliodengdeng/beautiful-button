<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth GSAP Gradient Guide</title>
    <style>
      :root {
        --absolute-zero: #0e100f;
        --frosted-canvas: #fffce1;
        --faded-steel: #7c7c6f;
        --fiery-orange: #ff8709;
        --neon-pink: #fec5fb;
        --soft-pink: #f7bdf8;
        --soft-rose: #f08ad8;
        --digital-violet: #9d95ff;
        --aqua-glow: #00bae2;
        --shock-green: #0ae448;
        --light-green: #abff84;
        --sky-bright: #15bfe4;
        --radius-card: 8px;
        --radius-pill: 100px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--absolute-zero);
        color: var(--frosted-canvas);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Noto Sans SC",
          "PingFang SC",
          sans-serif;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--absolute-zero);
      }

      .page {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 72px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.56fr);
        gap: clamp(24px, 5vw, 64px);
        align-items: end;
        margin-bottom: 34px;
      }

      .kicker {
        display: inline-flex;
        width: fit-content;
        border: 1px solid rgba(255, 252, 225, 0.5);
        border-radius: var(--radius-pill);
        padding: 8px 14px;
        color: var(--neon-pink);
        font-size: 14px;
        line-height: 1;
      }

      h1 {
        max-width: 880px;
        margin: 20px 0 0;
        color: var(--frosted-canvas);
        font-size: clamp(42px, 7.4vw, 96px);
        font-weight: 650;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .hero p {
        margin: 0;
        color: color-mix(in srgb, var(--frosted-canvas) 78%, transparent);
        font-size: 18px;
        line-height: 1.55;
      }

      .token-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 34px;
        padding: 16px;
        border: 1px solid rgba(255, 252, 225, 0.14);
        border-radius: var(--radius-card);
        background: rgba(255, 252, 225, 0.035);
      }

      .token {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 252, 225, 0.16);
        border-radius: var(--radius-pill);
        padding: 8px 12px;
        color: color-mix(in srgb, var(--frosted-canvas) 84%, transparent);
        font-size: 13px;
        white-space: nowrap;
      }

      .swatch {
        width: 14px;
        height: 14px;
        border: 1px solid rgba(14, 16, 15, 0.24);
        border-radius: 50%;
        background: var(--swatch);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .gradient-set {
        position: relative;
        overflow: hidden;
        border-radius: var(--radius-card);
        background: rgba(255, 252, 225, 0.035);
        cursor: pointer;
      }

      .gradient-set::before {
        content: none;
      }

      .set-inner {
        position: relative;
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      .set-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      h2 {
        margin: 0;
        color: var(--frosted-canvas);
        font-size: 22px;
        font-weight: 650;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .tag {
        flex: 0 0 auto;
        border: 1px solid color-mix(in srgb, var(--accent-a) 66%, var(--frosted-canvas));
        border-radius: var(--radius-pill);
        padding: 7px 10px;
        color: var(--accent-a);
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
      }

      .sample-card {
        position: relative;
        overflow: hidden;
        display: flex;
        min-height: 148px;
        align-items: flex-end;
        border-radius: var(--radius-card);
        padding: 16px;
        color: var(--sample-text);
        background: var(--gradient);
      }

      .sample-card p {
        position: relative;
        z-index: 1;
        max-width: 320px;
        margin: 0;
        font-size: clamp(22px, 2.4vw, 30px);
        font-weight: 650;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .button-column {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .sample-button {
        position: relative;
        display: inline-flex;
        min-height: 58px;
        width: 100%;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-pill);
        text-decoration: none;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0;
        border: none;
        padding: 16px 20px;
        color: var(--button-text);
        background: var(--gradient);
        cursor: pointer;
        overflow: hidden;
        will-change: transform;
        transform: translate3d(0, 0, 0);
      }

      .sample-button .button-label {
        position: relative;
        z-index: 1;
        pointer-events: none;
        will-change: transform;
        transform: translate3d(0, 0, 0);
      }

      .outline-button {
        border: none;
        padding: 0;
        background: rgba(255, 252, 225, 0.08);
        color: var(--frosted-canvas);
      }

      .outline-button span {
        display: inline-flex;
        width: 100%;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-pill);
        background: transparent;
        color: var(--frosted-canvas);
      }

      .spec {
        display: grid;
        color: color-mix(in srgb, var(--frosted-canvas) 76%, transparent);
        font-size: 13px;
        line-height: 1.45;
      }

      .label {
        color: var(--faded-steel);
      }

      code {
        display: block;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--frosted-canvas);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
      }

      .usage {
        border-top: 1px solid rgba(255, 252, 225, 0.1);
        padding-top: 12px;
        color: color-mix(in srgb, var(--frosted-canvas) 78%, transparent);
        font-size: 14px;
        line-height: 1.5;
      }

      .footer-note {
        margin-top: 34px;
        border: 1px solid rgba(255, 252, 225, 0.14);
        border-radius: var(--radius-card);
        padding: 16px;
        color: color-mix(in srgb, var(--frosted-canvas) 78%, transparent);
        font-size: 15px;
        line-height: 1.55;
      }

      @media (max-width: 1080px) {
        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .page {
          width: min(100% - 24px, 1240px);
          padding-top: 32px;
        }

        .grid,
        .set-top,
        .button-column {
          grid-template-columns: 1fr;
          flex-direction: column;
        }
      }
    </style>
  </head>

      const grid = document.querySelector("#gradientGrid");

      grid.innerHTML = gradients
        .map(
          (item) => `
            <article class="gradient-set" style="--gradient: ${item.gradient}; --accent-a: ${item.accentA}; --accent-b: ${item.accentB}; --sample-text: ${item.textColor}; --button-text: ${item.textColor};">
              <div class="set-inner">
                <button class="sample-button" type="button" data-copy="background: ${item.gradient};
color: ${item.textColor};"><span class="button-label">button</span></button>
                <div class="spec">
                  <code>background: ${item.gradient};
color: ${item.textColor};</code>
                </div>
              </div>
            </article>
          `,
        )
        .join("");

      document.querySelectorAll(".sample-button").forEach((button) => {
        button.addEventListener("click", async () => {
          const css = button.dataset.copy ?? "";
          const label = button.querySelector(".button-label");
          const original = label.textContent;

          try {
            await navigator.clipboard.writeText(css);
            label.textContent = "copied";
          } catch {
            const textarea = document.createElement("textarea");
            textarea.value = css;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
            label.textContent = "copied";
          }

          window.setTimeout(() => {
            label.textContent = original;
          }, 900);
        });
      });

      const magneticStrength = 0.18;
      const labelStrength = 0.1;
      const supportsFinePointer = window.matchMedia("(pointer: fine)").matches;

      function mapRange(inMin, inMax, outMin, outMax, value) {
        return outMin + ((value - inMin) / (inMax - inMin)) * (outMax - outMin);
      }

      function animateMagnetic(element, x, y, duration = 400, easing = "cubic-bezier(0.22, 1, 0.36, 1)") {
        if (window.gsap) {
          gsap.to(element, {
            x,
            y,
            duration: duration / 1000,
            ease: duration > 500 ? "elastic.out(1, 0.4)" : "power2.out",
            overwrite: true,
          });
          return;
        }

        element.style.transition = `transform ${duration}ms ${easing}`;
        element.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }

      if (supportsFinePointer) {
        let activeZone = null;

        function resetZone(zone) {
          if (!zone) return;
          const button = zone.querySelector(".sample-button");
          const label = zone.querySelector(".button-label");
          animateMagnetic(button, 0, 0, 700, "cubic-bezier(0.34, 1.56, 0.64, 1)");
          animateMagnetic(label, 0, 0, 700, "cubic-bezier(0.34, 1.56, 0.64, 1)");
        }

        document.querySelectorAll(".gradient-set").forEach((zone) => {
          const button = zone.querySelector(".sample-button");
          const label = zone.querySelector(".button-label");

          zone.addEventListener("mousemove", (event) => {
            activeZone = zone;
            const rect = zone.getBoundingClientRect();
            const mappedX = mapRange(rect.left, rect.right, -rect.width / 2, rect.width / 2, event.clientX);
            const mappedY = mapRange(rect.top, rect.bottom, -rect.height / 2, rect.height / 2, event.clientY);

            animateMagnetic(button, mappedX * magneticStrength, mappedY * magneticStrength, 400);
            animateMagnetic(label, mappedX * labelStrength, mappedY * labelStrength, 400);
          });

          zone.addEventListener("mouseleave", () => {
            resetZone(zone);
            if (activeZone === zone) activeZone = null;
          });
        });

        document.addEventListener("mousemove", (event) => {
          if (!activeZone) return;
          const rect = activeZone.getBoundingClientRect();
          const inside =
            event.clientX >= rect.left &&
            event.clientX <= rect.right &&
            event.clientY >= rect.top &&
            event.clientY <= rect.bottom;

          if (!inside) {
            resetZone(activeZone);
            activeZone = null;
          }
        });
      }
